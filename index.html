<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/header-style.css">
    <link rel="stylesheet" href="styles/main-content.css">
    <link rel="stylesheet" href="styles/sections-style.css">
    <title>Giusy Nails</title>
</head>
<body>
    <header>
        <div class="logo">
            <a href=""><img src="https://i.imgur.com/fwLJE1U.png" alt="Logo"></a>
        </div>
        <nav class="main-menu">
            <ul class="over700">
                <li class="home"><a href="#">Home</a></li>
                <li class="chisono"><a href="#">Chi sono</a></li>
                <li class="servizi"><a href="#">Servizi</a></li>
            </ul>
            <ul class="under700">
                <li class="menuicon"><a href="#"><img src="https://i.imgur.com/KABRm2b.png" alt="menu"></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="main-content" id="banner">
            <div class="content description">
                <h1>Io sono Giusy!</h1>
                <h2>La Nail Artist che renderà le tue unghie
                    miracolose!
                </h2>
                <div class="button">Scopri di più</div>
            </div>
            <div class="content image">
                <img src="https://i.imgur.com/jVVmS41.jpg" alt="Giusy">
                
            </div>
        </div>
        <div class="section">
            <div class="section-content">
                <div class="card" id="nail1">
                    <img src="https://imgur.com/Ji6L5o2.jpg" alt="Nailfoto1">
                    <h2>Refill</h2>
                    <span>Solo €20.00</span>
                </div>
                <div class="card" id="nail2">
                    <img src="https://imgur.com/Ji6L5o2.jpg" alt="Nailfoto2">
                    <h2>Ricostruzione</h2>
                    <span>Solo €25.00</span>
                </div>

            </div>

        </div>
    </main>
</body>
</html>
